<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bốc Thăm Bắt Cặp</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#46178f,#7b1fa2);
    min-height:100vh;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px;
}

h1{
    margin-bottom:20px;
}

.container{
    width:100%;
    max-width:1000px;
}

textarea{
    width:100%;
    height:150px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    resize:none;
}

.controls{
    margin:20px 0;
    text-align:center;
}

button{
    border:none;
    background:#ff3355;
    color:white;
    padding:15px 35px;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#display{
    height:150px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
    text-align:center;
    margin:30px 0;
}

.running{
    animation:pulse .1s linear infinite;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.05);
    }
}

.result{
    background:rgba(255,255,255,.15);
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    font-size:24px;
}

.count{
    margin-top:10px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

    <h1>🎲 BỐC THĂM BẮT CẶP</h1>

    <textarea id="names">
An
Bình
Chi
Dũng
Hà
Lan
Minh
Ngọc
Phúc
Quân
Trang
Tuấn
    </textarea>

    <div class="controls">
        <button onclick="startPairing()">BỐC THĂM</button>
    </div>

    <div id="display">
        READY
    </div>

    <div class="count" id="count"></div>

    <div id="results"></div>

</div>

<script>

let participants = [];
let pairingStarted = false;

const display = document.getElementById("display");
const results = document.getElementById("results");
const count = document.getElementById("count");

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function updateCount(){
    count.innerHTML =
        `Còn lại: <b>${participants.length}</b> người`;
}

function rollingSelect(){

    return new Promise(resolve => {

        let loop = 0;

        display.classList.add("running");

        const timer = setInterval(()=>{

            display.innerText =
                participants[
                    Math.floor(
                        Math.random()*participants.length
                    )
                ];

            loop++;

            if(loop >= 40){

                clearInterval(timer);

                const index =
                    Math.floor(
                        Math.random()*participants.length
                    );

                const selected =
                    participants.splice(index,1)[0];

                display.classList.remove("running");

                display.innerText = selected;

                updateCount();

                resolve(selected);
            }

        },80);

    });

}

async function startPairing(){

    if(!pairingStarted){

        participants = document
            .getElementById("names")
            .value
            .split("\n")
            .map(e => e.trim())
            .filter(e => e);

        shuffle(participants);

        pairingStarted = true;

        updateCount();
    }

    if(participants.length < 2){

        alert("Không còn đủ người để ghép cặp.");

        return;
    }

    const person1 = await rollingSelect();

    await new Promise(r => setTimeout(r,800));

    const person2 = await rollingSelect();

    display.innerHTML =
        `${person1} ❤️ ${person2}`;

    const div = document.createElement("div");

    div.className = "result";

    div.innerHTML =
        `🎉 ${person1} ❤️ ${person2}`;

    results.prepend(div);

    if(participants.length < 2){
        display.innerHTML = "🏁 HOÀN THÀNH";
    }
}

</script>

</body>
</html>
