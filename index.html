<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bốc Thăm Bắt Cặp</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#46178f,#7b1fa2);
    min-height:100vh;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px;
}

h1{
    margin-bottom:20px;
}

.container{
    width:100%;
    max-width:1000px;
}

textarea{
    width:100%;
    height:150px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    resize:none;
}

.controls{
    margin:20px 0;
    text-align:center;
}

button{
    border:none;
    background:#ff3355;
    color:white;
    padding:15px 35px;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#display{
    height:150px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
    text-align:center;
    margin:30px 0;
}

.running{
    animation:pulse .1s linear infinite;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.05);
    }
}

.result{
    background:rgba(255,255,255,.15);
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    font-size:24px;
}

.count{
    margin-top:10px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">

    <h1>🎲 BỐC THĂM BẮT CẶP</h1>

    <div class="controls">
        <button onclick="startPairing()">BỐC THĂM</button>
    </div>

    <div id="display">
        READY
    </div>

    <div class="count" id="count"></div>

    <div id="results"></div>

</div>

<script>

const predefinedPairs = [
    ["Phát", "Ly"],
    ["Trí", "Trang"],
    ["Bình", "Châu"],
    ["Đào", "Phương"],
    ["Hà", "Lam"],
    ["Tuyến", "Hương"],
    ["Trinh", "Ngân"],
    ["Thành", "Dung"],
    ["Hải", "Ngọc"]
];

let remainingNames = predefinedPairs.flat();
let pairIndex = 0;

const display = document.getElementById("display");
const results = document.getElementById("results");
const count = document.getElementById("count");

function updateCount(){
    const remaining = predefinedPairs.length - pairIndex;
    count.innerHTML = remaining > 0
        ? `Còn lại: <b>${remaining}</b> cặp`
        : "";
}

function rollingSelect(finalName){

    return new Promise(resolve => {

        let loop = 0;

        display.classList.add("running");

        const timer = setInterval(()=>{

            display.innerText =
                remainingNames[
                    Math.floor(Math.random() * remainingNames.length)
                ];

            loop++;

            if(loop >= 40){

                clearInterval(timer);

                display.classList.remove("running");

                display.innerText = finalName;

                const idx = remainingNames.indexOf(finalName);
                if(idx > -1) remainingNames.splice(idx, 1);

                resolve(finalName);
            }

        }, 80);

    });

}

async function startPairing(){

    if(pairIndex >= predefinedPairs.length){
        alert("Đã bốc thăm hết tất cả các cặp.");
        return;
    }

    const [person1, person2] = predefinedPairs[pairIndex];
    pairIndex++;

    const p1 = await rollingSelect(person1);

    await new Promise(r => setTimeout(r, 800));

    const p2 = await rollingSelect(person2);

    display.innerHTML = `${p1} ❤️ ${p2}`;

    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `🎉 ${p1} ❤️ ${p2}`;
    results.prepend(div);

    updateCount();

    if(pairIndex >= predefinedPairs.length){
        display.innerHTML = "🏁 HOÀN THÀNH";
    }
}

updateCount();

</script>

</body>
</html>
